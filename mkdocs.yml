site_name: Daily arXiv
site_url: https://zhaoyang97.github.io/daily-arxiv/
site_description: 每日 arXiv AI/LLM/NLP/CV 论文精选笔记
repo_url: https://github.com/zhaoyang97/daily-arxiv
docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.instant
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

